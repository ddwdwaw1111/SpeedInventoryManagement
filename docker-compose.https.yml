services:
  mariadb:
    image: mariadb:11
    container_name: speed-inventory-db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-change-this-root-password}
      MARIADB_DATABASE: ${MARIADB_DATABASE:-speed_inventory_management}
      MARIADB_USER: ${MARIADB_USER:-inventory_user}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-change-this-db-password}
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-uroot", "-p${MARIADB_ROOT_PASSWORD:-change-this-root-password}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro

  backend:
    image: ${BACKEND_IMAGE:-sim-backend:prod}
    container_name: speed-inventory-api
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      APP_ENV: production
      SERVER_PORT: 8080
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-https://www.corgi4ever.com}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-true}
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_NAME: ${MARIADB_DATABASE:-speed_inventory_management}
      DB_USER: ${MARIADB_USER:-inventory_user}
      DB_PASSWORD: ${MARIADB_PASSWORD:-change-this-db-password}
    expose:
      - "8080"

  frontend:
    image: ${FRONTEND_IMAGE:-sim-frontend:prod}
    container_name: speed-inventory-web
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "80"

  reverse-proxy:
    image: nginx:1.27-alpine
    container_name: speed-inventory-proxy
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    environment:
      SITE_DOMAIN: ${SITE_DOMAIN:-www.corgi4ever.com}
      SITE_DOMAIN_ALIASES: ${SITE_DOMAIN_ALIASES:-}
    command: ["/bin/sh", "/scripts/start-proxy.sh"]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/templates:/templates:ro
      - ./deploy/nginx/start-proxy.sh:/scripts/start-proxy.sh:ro
      - certbot_www:/var/www/certbot
      - letsencrypt_certs:/etc/letsencrypt

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_www:/var/www/certbot
      - letsencrypt_certs:/etc/letsencrypt

volumes:
  mariadb_data:
  certbot_www:
  letsencrypt_certs:
