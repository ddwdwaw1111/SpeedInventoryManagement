services:
  mariadb:
    image: mariadb:11
    container_name: speed-inventory-db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-change-this-root-password}
      MARIADB_DATABASE: ${MARIADB_DATABASE:-speed_inventory_management}
      MARIADB_USER: ${MARIADB_USER:-inventory_user}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-change-this-db-password}
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-uroot", "-p${MARIADB_ROOT_PASSWORD:-change-this-root-password}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro

  backend:
    build:
      context: ./backend
    container_name: speed-inventory-api
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      APP_ENV: production
      SERVER_PORT: 8080
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost}
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_NAME: ${MARIADB_DATABASE:-speed_inventory_management}
      DB_USER: ${MARIADB_USER:-inventory_user}
      DB_PASSWORD: ${MARIADB_PASSWORD:-change-this-db-password}
    expose:
      - "8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    container_name: speed-inventory-web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  mariadb_data:
